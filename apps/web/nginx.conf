# DeckOfUs frontend — static SPA served by nginx, acting as a same-origin
# reverse proxy in front of the internal `backend` service.
# The React app uses relative URLs, so nginx serves the static bundle (with SPA
# history fallback) AND reverse-proxies /api and /socket.io (websockets) to the
# internal `backend` service (backend:8080, not publicly exposed).

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Docker's embedded DNS, so the `backend` service name resolves at request
    # time. Using a variable for the upstream defers resolution so nginx won't
    # hard-fail at boot if the backend is briefly unavailable.
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream http://backend:8080;

    # gzip for text assets.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Reverse-proxy API requests to the internal backend.
    # NOTE: proxy_pass uses a variable, so nginx does NOT strip the /api/ prefix
    # — the backend mounts its routes at /api and expects the full path.
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CRITICAL: backend rate-limit/brute-force protection keys off
        # CF-Connecting-IP (then X-Forwarded-For). Without forwarding this header
        # every request collapses to the nginx IP and shares one rate bucket.
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # Reverse-proxy websocket (socket.io) traffic to the same backend.
    location /socket.io/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        # WebSocket upgrade.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Runtime config: an operator may mount/edit a real deck-config.json. Never
    # cache it so edits are always picked up fresh.
    location = /deck-config.json {
        add_header Cache-Control "no-cache";
        try_files  $uri =404;
    }

    # Long-cache fingerprinted build assets (Vite emits hashed filenames).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: any unknown path returns index.html so client-side routing
    # works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Lightweight health endpoint for Traefik / container healthchecks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
